name: Build Executables

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            output: quiz.exe
            asset_name: pyquiz-windows.exe
          - os: ubuntu-latest
            output: quiz
            asset_name: pyquiz-linux
          - os: macos-latest
            output: quiz
            asset_name: pyquiz-macos

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Instalar PyInstaller
        run: pip install pyinstaller

      - name: Gerar executável
        run: pyinstaller --onefile quiz.py

      - name: Renomear executável
        shell: bash
        run: mv dist/${{ matrix.output }} dist/${{ matrix.asset_name }}

      - name: Upload do executável
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
